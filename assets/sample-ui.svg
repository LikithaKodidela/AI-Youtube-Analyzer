<svg width="1284" height="906" viewBox="0 0 1284 906" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI YouTube Video Analyzer sample UI</title>
  <desc id="desc">A sample Streamlit interface showing a YouTube URL input, analyze button, success message, and analysis report preview.</desc>
  <rect width="1284" height="906" fill="#ffffff"/>
  <rect x="0" y="0" width="1284" height="2" fill="#b7d1d6"/>
  <g transform="translate(246 156)">
    <text x="0" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="#343442">AI Youtube Video Analyzer</text>
    <g transform="translate(16 0)">
      <rect x="0" y="24" width="43" height="24" rx="4" fill="#5b4a72"/>
      <rect x="6" y="30" width="31" height="14" rx="2" fill="#ece7f3"/>
      <circle cx="10" cy="37" r="3" fill="#ef4f86"/>
      <circle cx="24" cy="37" r="3" fill="#5b4a72"/>
      <rect x="39" y="30" width="7" height="10" rx="1" fill="#5b4a72"/>
      <circle cx="9" cy="10" r="9" fill="#5b4a72"/>
      <circle cx="29" cy="10" r="9" fill="#5b4a72"/>
      <circle cx="9" cy="9" r="3" fill="#8d789f"/>
      <circle cx="29" cy="9" r="3" fill="#8d789f"/>
      <path d="M43 29L57 20V48L43 40V29Z" fill="#4e4065"/>
    </g>
  </g>
  <g transform="translate(246 240)">
    <text x="0" y="12" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">Enter Youtube Video Link :</text>
    <rect x="0" y="26" width="880" height="50" rx="8" fill="#f0f2f6"/>
    <text x="15" y="57" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#0f172a">https://www.youtube.com/watch?v=2jU-mLMV8Vw</text>
    <rect x="0.5" y="96.5" width="131" height="49" rx="8" fill="#ffffff" stroke="#d1d5db"/>
    <text x="15" y="127" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">Analyze Video</text>
    <rect x="0" y="166" width="880" height="70" rx="8" fill="#e5f8eb"/>
    <text x="20" y="207" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#00803d">Analysis Complete</text>
  </g>
  <g transform="translate(246 515)">
    <g transform="translate(6 0)">
      <rect x="0" y="11" width="8" height="22" rx="2" fill="#95d64f"/>
      <rect x="11" y="5" width="8" height="28" rx="2" fill="#f35097"/>
      <rect x="22" y="0" width="8" height="33" rx="2" fill="#42b5e8"/>
      <rect x="1" y="12" width="6" height="20" fill="#b6e77f"/>
      <rect x="23" y="2" width="6" height="30" fill="#6cc9ef"/>
    </g>
    <text x="54" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">Analysis Report</text>
    <text x="0" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" fill="#1f2937">1) Video overview</text>
    <g transform="translate(355 84)">
      <rect x="0" y="0" width="23" height="31" rx="2" fill="#76d74b"/>
      <rect x="17" y="8" width="28" height="31" rx="2" fill="#ee4c91"/>
      <rect x="31" y="13" width="29" height="31" rx="2" fill="#39b8e8"/>
      <rect x="65" y="0" width="38" height="28" rx="2" fill="#5dd2f2" stroke="#477de8" stroke-width="2"/>
      <path d="M74 30H94L99 41H69L74 30Z" fill="#b7bbc9"/>
      <rect x="68" y="42" width="33" height="3" fill="#8f94a3"/>
    </g>
    <text x="0" y="174" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Video:</text>
    <text x="58" y="174" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-style="italic" fill="#1f2937">Cybersecurity Trends in 2026: Shadow AI, Quantum &amp; Deepfakes</text>
    <text x="0" y="206" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Channel/Author:</text>
    <text x="150" y="206" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#1f2937">IBM Technology</text>
    <text x="0" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Type:</text>
    <text x="58" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#1f2937">Educational / Technical cybersecurity talk</text>
    <text x="0" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Length:</text>
    <text x="72" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#1f2937">~20:16 based on caption timeline</text>
    <text x="0" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">High-level structure</text>
  </g>
